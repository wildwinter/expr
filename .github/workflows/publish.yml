name: Publish

# Publishes the @wildwinter packages (expr, then scoperegistry and expr-editor,
# which depend on it) to the public
# npm registry (npmjs.org) when a GitHub Release is published. Cut releases with
# `npm run release:expr -- patch` (etc.) - that script bumps package.json,
# commits, pushes, and tags in one step, so the released tag always points at a
# fresh, not-yet-published version. (Tagging a version that's already on the
# registry would make this workflow a silent no-op: every publish step below
# skips an already-published version.)
#
# This is a workspaces monorepo; `npm ci` installs every package (the two
# @wildwinter packages resolve to each other locally via workspaces, not the
# registry), then we build + test all of them and publish each package whose
# current version is not yet on npm. scoperegistry is published AFTER expr (it
# depends on it), and each publish is guarded so a release that only bumps one
# package does not fail trying to republish the unchanged one.
#
# Requires an NPM_TOKEN repo secret: an npm automation token for an account with
# publish rights to the @wildwinter scope on npmjs.org. The packages publish
# publicly via `publishConfig.access: public`.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          # Inject npm auth from NODE_AUTH_TOKEN at runtime, so the committed
          # .npmrc carries no token line (which would shadow a local token for
          # anyone running npm in this repo).
          registry-url: https://registry.npmjs.org
          scope: '@wildwinter'
      - run: npm ci
      - run: npm run typecheck --workspaces --if-present
      - run: npm run build --workspaces --if-present
      - run: npm test --workspaces --if-present
      # Publish expr first (scoperegistry depends on it), then scoperegistry.
      # Skip whichever version is already published so partial releases pass.
      - name: Publish @wildwinter/expr
        run: |
          VER=$(node -p "require('./packages/expr/package.json').version")
          if npm view "@wildwinter/expr@$VER" version >/dev/null 2>&1; then
            echo "@wildwinter/expr@$VER already published; skipping."
          else
            npm publish -w packages/expr
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish @wildwinter/scoperegistry
        run: |
          VER=$(node -p "require('./packages/scoperegistry/package.json').version")
          if npm view "@wildwinter/scoperegistry@$VER" version >/dev/null 2>&1; then
            echo "@wildwinter/scoperegistry@$VER already published; skipping."
          else
            npm publish -w packages/scoperegistry
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      # expr-editor also depends on expr, so it publishes after it too.
      - name: Publish @wildwinter/expr-editor
        run: |
          VER=$(node -p "require('./packages/expr-editor/package.json').version")
          if npm view "@wildwinter/expr-editor@$VER" version >/dev/null 2>&1; then
            echo "@wildwinter/expr-editor@$VER already published; skipping."
          else
            npm publish -w packages/expr-editor
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

name: Publish

# Publishes @wildwinter/expr to GitHub Packages (private; visibility follows the
# private repo) when a GitHub Release is published. Bump the package version in
# packages/expr/package.json before tagging - GitHub Packages rejects
# republishing a version.
#
# This is a workspaces monorepo; `npm ci` installs every package, then we build
# + test + publish the expr package specifically. When @wildwinter/scoperegistry
# is ready to publish, add an equivalent step (or a matrix) for it.

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck -w packages/expr
      - run: npm run build -w packages/expr
      - run: npm test -w packages/expr
      - run: npm publish -w packages/expr
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
